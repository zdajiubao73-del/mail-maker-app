<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>メールAI - App Store Screenshot 5</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 430px; height: 932px; overflow: hidden; }
body {
  font-family: -apple-system, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', sans-serif;
  background: linear-gradient(168deg, #0f2d70 0%, #1e40af 50%, #3b82f6 100%);
  display: flex; flex-direction: column; align-items: center;
  padding: 48px 28px 0; position: relative;
}
.c1, .c2, .c3 { position: absolute; border-radius: 50%; pointer-events: none; }
.c1 { width: 360px; height: 360px; background: rgba(255,255,255,0.05); top: -110px; right: -100px; }
.c2 { width: 200px; height: 200px; background: rgba(255,255,255,0.04); bottom: 100px; left: -80px; }
.c3 { width: 120px; height: 120px; background: rgba(59,130,246,0.22); top: 310px; right: -20px; }

.badge {
  background: #fff; color: #1e40af; font-size: 14px; font-weight: 800;
  padding: 9px 22px; border-radius: 999px; margin-bottom: 26px;
  position: relative; align-self: flex-start;
  box-shadow: 0 4px 16px rgba(0,0,0,0.22); letter-spacing: .02em; white-space: nowrap;
}
.badge::after {
  content: ''; position: absolute; bottom: -9px; left: 22px;
  width: 0; height: 0;
  border-left: 6px solid transparent; border-right: 6px solid transparent;
  border-top: 10px solid #fff;
}

.text-section { width: 100%; color: white; margin-bottom: 20px; }
.small-label { font-size: 13px; font-weight: 600; opacity: 0.65; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px; }
.hl { font-size: 52px; font-weight: 900; line-height: 1.12; letter-spacing: -0.02em; }
.hl-accent { color: #fbbf24; font-size: 60px; font-weight: 900; letter-spacing: -0.03em; line-height: 1.08; display: block; }
.desc { margin-top: 14px; font-size: 15px; font-weight: 500; opacity: 0.82; line-height: 1.65; }

.phone-wrap { flex: 1; display: flex; align-items: flex-end; justify-content: center; }
.phone {
  width: 242px; height: 528px;
  background: #0c0c0c; border-radius: 50px; padding: 13px;
  position: relative; flex-shrink: 0;
  box-shadow: 0 0 0 1.5px #2e2e2e, 0 0 0 3px #111, 0 30px 80px rgba(0,0,0,0.55), 0 0 40px rgba(59,130,246,0.15);
  transform: perspective(1000px) rotateY(-4deg) rotateX(1deg);
}
.phone-screen { width: 100%; height: 100%; background: #f5f5f7; border-radius: 38px; overflow: hidden; position: relative; }
.di { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); width: 88px; height: 26px; background: #0c0c0c; border-radius: 13px; z-index: 10; }

.ah { background: #1e40af; padding: 46px 14px 10px; }
.ah-t { color: white; font-size: 13px; font-weight: 800; text-align: center; }
.ah-s { color: rgba(255,255,255,0.6); font-size: 9px; margin-top: 3px; text-align: center; }

.search-bar {
  margin: 8px 10px 0; background: white; border-radius: 8px;
  padding: 7px 10px; display: flex; align-items: center; gap: 6px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
}
.search-icon { font-size: 11px; }
.search-placeholder { font-size: 10px; color: #9ca3af; }

.ab { padding: 8px 10px; display: flex; flex-direction: column; gap: 6px; }

.sync-badge {
  background: #dbeafe; border-radius: 8px; padding: 6px 10px;
  display: flex; align-items: center; gap: 6px; border: 1.5px solid #93c5fd;
}
.sync-badge span { font-size: 9px; font-weight: 800; color: #1d4ed8; }

.contact-item {
  background: white; border-radius: 10px; padding: 9px 11px;
  box-shadow: 0 1px 5px rgba(0,0,0,0.06); border: 1px solid #f3f4f6;
  display: flex; align-items: center; gap: 9px;
}
.avatar {
  width: 32px; height: 32px; border-radius: 50%;
  font-size: 11px; font-weight: 800; color: white;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.av1 { background: linear-gradient(135deg, #1d4ed8, #3b82f6); }
.av2 { background: linear-gradient(135deg, #059669, #34d399); }
.av3 { background: linear-gradient(135deg, #d97706, #fbbf24); }
.av4 { background: linear-gradient(135deg, #7c3aed, #a78bfa); }
.av5 { background: linear-gradient(135deg, #dc2626, #f87171); }

.c-info { flex: 1; }
.c-name { font-size: 11px; font-weight: 700; color: #1f2937; }
.c-tags { display: flex; gap: 4px; margin-top: 3px; align-items: center; }
.chip { display: inline-block; font-size: 8px; font-weight: 700; padding: 2px 6px; border-radius: 4px; }
.cb { background: #dbeafe; color: #1d4ed8; }
.cg { background: #d1fae5; color: #065f46; }
.cy { background: #fef9c3; color: #92400e; }
.cp { background: #ede9fe; color: #5b21b6; }
.cr { background: #fee2e2; color: #991b1b; }
.c-source { font-size: 8px; color: #9ca3af; }
.c-action { color: #d1d5db; font-size: 14px; }
</style>
</head>
<body>
<div class="c1"></div><div class="c2"></div><div class="c3"></div>

<div class="badge">👤 相手に合わせた敬語で！</div>

<div class="text-section">
  <div class="small-label">Gmail・Outlook連携</div>
  <div class="hl">連絡先を</div>
  <span class="hl-accent">スマートに<br>管理</span>
  <div class="desc">Gmail・Outlookの連絡先を取り込み、<br>相手の関係性に合わせた敬語を自動選択。</div>
</div>

<div class="phone-wrap">
  <div class="phone">
    <div class="phone-screen">
      <img src="screen-5.PNG" style="width:100%;height:100%;object-fit:cover;object-position:top;border-radius:38px;" alt="アプリ画面">
    </div>
  </div>
</div>
</body>
</html>
