<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>メールAI - App Store Screenshot 1</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 430px; height: 932px; overflow: hidden; }
body {
  font-family: -apple-system, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', sans-serif;
  background: linear-gradient(168deg, #0f2d70 0%, #1a4fca 50%, #4285f4 100%);
  display: flex; flex-direction: column; align-items: center;
  padding: 48px 28px 0; position: relative;
}
.c1, .c2, .c3 { position: absolute; border-radius: 50%; pointer-events: none; }
.c1 { width: 360px; height: 360px; background: rgba(255,255,255,0.06); top: -120px; right: -110px; }
.c2 { width: 220px; height: 220px; background: rgba(255,255,255,0.04); bottom: 100px; left: -90px; }
.c3 { width: 120px; height: 120px; background: rgba(66,133,244,0.2); top: 260px; right: -20px; }

.badge {
  background: #fff; color: #1a4fca; font-size: 14px; font-weight: 800;
  padding: 9px 22px; border-radius: 999px; margin-bottom: 26px;
  position: relative; align-self: flex-start;
  box-shadow: 0 4px 16px rgba(0,0,0,0.22); letter-spacing: .02em; white-space: nowrap;
}
.badge::after {
  content: ''; position: absolute; bottom: -9px; left: 22px;
  width: 0; height: 0;
  border-left: 6px solid transparent; border-right: 6px solid transparent;
  border-top: 10px solid #fff;
}

.text-section { width: 100%; color: white; margin-bottom: 20px; }
.small-label {
  font-size: 13px; font-weight: 600; opacity: 0.65;
  letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px;
}
.hl { font-size: 52px; font-weight: 900; line-height: 1.12; letter-spacing: -0.02em; }
.hl-accent { color: #fbbf24; font-size: 60px; font-weight: 900; letter-spacing: -0.03em; line-height: 1.08; display: block; }
.desc { margin-top: 14px; font-size: 15px; font-weight: 500; opacity: 0.82; line-height: 1.65; }

.phone-wrap { flex: 1; display: flex; align-items: flex-end; justify-content: center; }
.phone {
  width: 242px; height: 528px;
  background: #0c0c0c; border-radius: 50px; padding: 13px;
  position: relative; flex-shrink: 0;
  box-shadow: 0 0 0 1.5px #2e2e2e, 0 0 0 3px #111, 0 30px 80px rgba(0,0,0,0.55), 0 0 40px rgba(59,130,246,0.15);
  transform: perspective(1000px) rotateY(-4deg) rotateX(1deg);
}
.phone-screen {
  width: 100%; height: 100%; background: #f0f2f5;
  border-radius: 38px; overflow: hidden; position: relative;
}
.di {
  position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
  width: 88px; height: 26px; background: #0c0c0c; border-radius: 13px; z-index: 10;
}

.ah { background: #1a4fca; padding: 46px 14px 12px; text-align: center; }
.ah-t { color: white; font-size: 13px; font-weight: 800; letter-spacing: .02em; }
.ah-s { color: rgba(255,255,255,0.6); font-size: 9px; margin-top: 3px; }

.ab { padding: 10px; display: flex; flex-direction: column; gap: 7px; }

.flash {
  background: #fef9c3; border-radius: 8px; padding: 7px 10px;
  display: flex; align-items: center; gap: 6px;
}
.flash span { font-size: 10px; font-weight: 800; color: #b45309; }

.si { display: flex; align-items: stretch; gap: 8px; }
.sdc { display: flex; flex-direction: column; align-items: center; }
.sd {
  width: 22px; height: 22px; background: #1a4fca; color: white;
  border-radius: 50%; font-size: 10px; font-weight: 800;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.sl { width: 2px; flex: 1; background: #dbeafe; margin: 2px 0; }
.sc {
  flex: 1; background: white; border-radius: 10px; padding: 8px 11px;
  box-shadow: 0 1px 5px rgba(0,0,0,0.07); border: 1px solid #f3f4f6;
}
.sl2 { font-size: 8px; color: #9ca3af; font-weight: 600; margin-bottom: 4px; letter-spacing: .05em; }
.sv { font-size: 11px; font-weight: 700; color: #1f2937; }
.chip {
  display: inline-block; font-size: 9px; font-weight: 700;
  padding: 2px 7px; border-radius: 4px; margin-right: 3px;
}
.cb { background: #dbeafe; color: #1d4ed8; }
.cp { background: #ede9fe; color: #6d28d9; }

.gb {
  background: linear-gradient(135deg, #1a4fca, #4285f4); border-radius: 12px;
  padding: 13px 10px; text-align: center;
  box-shadow: 0 5px 15px rgba(26,79,202,0.45); margin-top: 2px;
}
.gb-t { color: white; font-size: 13px; font-weight: 800; }
.gb-s { color: rgba(255,255,255,0.72); font-size: 9px; margin-top: 3px; }
</style>
</head>
<body>
<div class="c1"></div><div class="c2"></div><div class="c3"></div>

<div class="badge">✨ 新社会人・学生に大人気！</div>

<div class="text-section">
  <div class="small-label">AIが瞬時に作成</div>
  <div class="hl">最短</div>
  <span class="hl-accent">３０秒</span>
  <div class="hl">でメール生成</div>
  <div class="desc">タップ数回で、敬語・ビジネスマナー完璧な<br>日本語メールを自動作成。</div>
</div>

<div class="phone-wrap">
  <div class="phone">
    <div class="phone-screen">
      <img src="screen.PNG" style="width:100%;height:100%;object-fit:cover;object-position:top;border-radius:38px;" alt="アプリ画面">
    </div>
  </div>
</div>
</body>
</html>
