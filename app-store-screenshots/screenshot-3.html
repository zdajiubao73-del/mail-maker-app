<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>メールAI - App Store Screenshot 3</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 430px; height: 932px; overflow: hidden; }
body {
  font-family: -apple-system, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', sans-serif;
  background: linear-gradient(168deg, #2e1065 0%, #5b21b6 50%, #8b5cf6 100%);
  display: flex; flex-direction: column; align-items: center;
  padding: 48px 28px 0; position: relative;
}
.c1, .c2, .c3 { position: absolute; border-radius: 50%; pointer-events: none; }
.c1 { width: 340px; height: 340px; background: rgba(255,255,255,0.05); top: -100px; right: -100px; }
.c2 { width: 200px; height: 200px; background: rgba(255,255,255,0.04); bottom: 90px; left: -80px; }
.c3 { width: 100px; height: 100px; background: rgba(139,92,246,0.25); top: 330px; left: -10px; }

.badge {
  background: #fff; color: #5b21b6; font-size: 14px; font-weight: 800;
  padding: 9px 22px; border-radius: 999px; margin-bottom: 26px;
  position: relative; align-self: flex-start;
  box-shadow: 0 4px 16px rgba(0,0,0,0.22); letter-spacing: .02em; white-space: nowrap;
}
.badge::after {
  content: ''; position: absolute; bottom: -9px; left: 22px;
  width: 0; height: 0;
  border-left: 6px solid transparent; border-right: 6px solid transparent;
  border-top: 10px solid #fff;
}

.text-section { width: 100%; color: white; margin-bottom: 20px; }
.small-label { font-size: 13px; font-weight: 600; opacity: 0.65; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px; }
.hl { font-size: 52px; font-weight: 900; line-height: 1.12; letter-spacing: -0.02em; }
.hl-accent { color: #fbbf24; font-size: 60px; font-weight: 900; letter-spacing: -0.03em; line-height: 1.08; display: block; }
.desc { margin-top: 14px; font-size: 15px; font-weight: 500; opacity: 0.82; line-height: 1.65; }

.phone-wrap { flex: 1; display: flex; align-items: flex-end; justify-content: center; }
.phone {
  width: 242px; height: 528px;
  background: #0c0c0c; border-radius: 50px; padding: 13px;
  position: relative; flex-shrink: 0;
  box-shadow: 0 0 0 1.5px #2e2e2e, 0 0 0 3px #111, 0 30px 80px rgba(0,0,0,0.55), 0 0 40px rgba(139,92,246,0.18);
  transform: perspective(1000px) rotateY(-3deg);
}
.phone-screen { width: 100%; height: 100%; background: #f5f5f7; border-radius: 38px; overflow: hidden; position: relative; }
.di { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); width: 88px; height: 26px; background: #0c0c0c; border-radius: 13px; z-index: 10; }

.ah { background: #5b21b6; padding: 46px 14px 10px; text-align: center; }
.ah-t { color: white; font-size: 13px; font-weight: 800; }
.ah-s { color: rgba(255,255,255,0.6); font-size: 9px; margin-top: 3px; }

.ab { padding: 10px; display: flex; flex-direction: column; gap: 7px; overflow: hidden; }

.gen-count {
  background: #f3e8ff; border-radius: 8px; padding: 6px 10px;
  display: flex; align-items: center; gap: 6px; border: 1.5px solid #d8b4fe;
}
.gen-count span { font-size: 10px; font-weight: 800; color: #6d28d9; }

.mail-preview {
  background: white; border-radius: 10px; padding: 10px 11px;
  box-shadow: 0 1px 5px rgba(0,0,0,0.07); border: 1px solid #f3f4f6;
}
.mp-to { font-size: 8px; color: #9ca3af; font-weight: 600; margin-bottom: 5px; }
.mp-to span { color: #1f2937; font-weight: 700; }
.mp-subj { font-size: 10px; font-weight: 700; color: #1f2937; margin-bottom: 6px; padding-bottom: 5px; border-bottom: 1px solid #f3f4f6; }
.mp-body { font-size: 9px; color: #374151; line-height: 1.6; }
.mp-fade { color: #9ca3af; font-size: 8px; margin-top: 4px; }

.regen-row { display: flex; gap: 6px; }
.regen-btn {
  flex: 1; background: #f3e8ff; border: 2px solid #8b5cf6; border-radius: 10px;
  padding: 10px; text-align: center;
}
.regen-btn-t { font-size: 11px; font-weight: 800; color: #5b21b6; }
.regen-btn-s { font-size: 8px; color: #7c3aed; margin-top: 2px; }

.send-btn {
  flex: 1.4; background: linear-gradient(135deg, #5b21b6, #8b5cf6);
  border-radius: 10px; padding: 10px; text-align: center;
  box-shadow: 0 4px 12px rgba(91,33,182,0.4);
}
.send-btn-t { color: white; font-size: 11px; font-weight: 800; }
.send-btn-s { color: rgba(255,255,255,0.7); font-size: 8px; margin-top: 2px; }

.edit-link { text-align: center; font-size: 9px; color: #5b21b6; font-weight: 600; text-decoration: underline; }
</style>
</head>
<body>
<div class="c1"></div><div class="c2"></div><div class="c3"></div>

<div class="badge">🔄 こだわり派も安心！</div>

<div class="text-section">
  <div class="small-label">気に入るまで無制限</div>
  <div class="hl">納得いくまで</div>
  <span class="hl-accent">何度も</span>
  <div class="hl">再生成できる</div>
  <div class="desc">気に入らなければワンタップで再生成。<br>自分の言葉で修正も自由自在。</div>
</div>

<div class="phone-wrap">
  <div class="phone">
    <div class="phone-screen">
      <img src="screen-3.PNG" style="width:100%;height:100%;object-fit:cover;object-position:top;border-radius:38px;" alt="アプリ画面">
    </div>
  </div>
</div>
</body>
</html>
