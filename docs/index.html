<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>メールメーカー - AIがビジネスメールを自動作成</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; background: #0a0a1a; color: #fff; }
    header { padding: 24px 40px; display: flex; align-items: center; gap: 12px; }
    header img { width: 48px; height: 48px; border-radius: 12px; }
    header h1 { font-size: 20px; font-weight: 700; }
    .hero { text-align: center; padding: 80px 24px 60px; }
    .hero h2 { font-size: 42px; font-weight: 800; line-height: 1.2; margin-bottom: 16px; }
    .hero h2 span { color: #6C63FF; }
    .hero p { font-size: 18px; color: #aaa; max-width: 500px; margin: 0 auto 40px; line-height: 1.6; }
    .badge { display: inline-block; background: #1a1a2e; border: 1px solid #333; border-radius: 8px; padding: 12px 24px; font-size: 14px; color: #aaa; }
    .features { display: flex; flex-wrap: wrap; gap: 24px; padding: 40px; justify-content: center; max-width: 900px; margin: 0 auto; }
    .feature { background: #111; border: 1px solid #222; border-radius: 16px; padding: 24px; flex: 1; min-width: 240px; }
    .feature h3 { font-size: 16px; margin-bottom: 8px; }
    .feature p { font-size: 14px; color: #888; line-height: 1.5; }
    footer { text-align: center; padding: 40px 24px; border-top: 1px solid #222; color: #666; font-size: 14px; }
    footer a { color: #6C63FF; text-decoration: none; margin: 0 12px; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <header>
    <h1>メールメーカー</h1>
  </header>

  <section class="hero">
    <h2>もう<span>敬語メール</span>で<br>悩まない</h2>
    <p>送信相手を選ぶだけで、AIが敬語・トーンを自動最適化。ビジネスメールを最短30秒で作成。</p>
    <span class="badge">App Store で配信中</span>
  </section>

  <section class="features">
    <div class="feature">
      <h3>✨ AIメール自動生成</h3>
      <p>目的・相手・トーンを選ぶだけで、敬語に配慮した日本語メールを瞬時に生成します。</p>
    </div>
    <div class="feature">
      <h3>📧 Gmail連携</h3>
      <p>Gmailと連携して、作成したメールをアプリから直接送信できます。</p>
    </div>
    <div class="feature">
      <h3>👥 連絡先管理</h3>
      <p>送信相手の関係性・役職を登録することで、毎回最適なトーンのメールを生成します。</p>
    </div>
  </section>

  <footer>
    <p>© 2026 Tomoya Okubo</p>
    <p style="margin-top: 12px;">
      <a href="https://wwjbefbnpbgmtcrrmpax.supabase.co/functions/v1/privacy">プライバシーポリシー</a>
      <a href="https://wwjbefbnpbgmtcrrmpax.supabase.co/functions/v1/terms">利用規約</a>
    </p>
  </footer>
</body>
</html>
